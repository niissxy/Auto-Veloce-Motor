<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium vibrant red gradient for Auto Veloce flame logo -->
    <linearGradient id="premiumRed" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="40%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#f87171" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#dc2626" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Circular background with a subtle, very dark aesthetic, matching the Navbar -->
  <circle cx="256" cy="256" r="240" fill="#09090b" stroke="#1c1917" stroke-width="8" />

  <!-- The exact Lucide Flame Path scaled and styled professionally with red gradient and shadow glow -->
  <g transform="translate(100, 80) scale(13)" filter="url(#glow)">
    <path 
      d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" 
      fill="url(#premiumRed)"
      stroke="#dc2626"
      stroke-width="0.5"
      stroke-linejoin="round"
    />
  </g>
</svg>
